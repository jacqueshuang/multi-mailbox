name: Build and push image to GHCR

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to publish (e.g. v1.2.3)"
        required: true
      push:
        description: "Push image to GHCR"
        required: false
        default: "true"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/multi-mailbox
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=${{ inputs.image_tag }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'workflow_dispatch' && inputs.push == 'true' || github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_APP_ID=${{ vars.VITE_APP_ID }}
            VITE_PUBLIC_BASE_URL=${{ vars.VITE_PUBLIC_BASE_URL }}
            VITE_OAUTH_PORTAL_URL=${{ vars.VITE_OAUTH_PORTAL_URL }}
